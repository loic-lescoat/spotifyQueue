<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Queue Master</title>
    <link rel="stylesheet" href="src/css/landingPage.css">

    <script src="src/windowLoaders/landingPageLoader.ts" type="module"></script>
    <script type="module">
        import { redirectToAuthCodeFlow } from "./src/Spotify/authCodeWithPkce.ts";

        const clientId = import.meta.env.VITE_SPOTIFY_CLIENT_ID;
        document.getElementById("loginBtn")?.addEventListener("click", async () => {
            await redirectToAuthCodeFlow(clientId);
        });
    </script>
</head>

<body class="landing">

    <div class="floating-albums" id="floatingAlbums"></div>

    <div class="landing-container">
        <h1 class="app-title">Queue Master</h1>

        <div class="landing-island">
            <p>
                Connect with your Spotify account to use Queue Master.<br><br>
                Join another user's jam (Jams last 1 hour) or use your own account to follow along.<br><br>
                Note: If no music is playing or you don’t have a Premium account, the queue will be empty.<br><br>
                Still in BETA so use at your own risk.<br><br>
            </p>

            <button id="loginBtn" class="spotify-login-btn">
                <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/Spotify_Logo_RGB_White.png" alt="Spotify Logo" />
                Connect with Spotify
            </button>
        </div>
    </div>
</body>
</html>
