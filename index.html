<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Queue Master</title>
    <link rel="stylesheet" href="src/css/landingPage.css">
    <script type="module">
        import { redirectToAuthCodeFlow } from "./src/Spotify/authCodeWithPkce.ts";

        const clientId = import.meta.env.VITE_SPOTIFY_CLIENT_ID;
        document.getElementById("loginBtn")?.addEventListener("click", async () => {
            await redirectToAuthCodeFlow(clientId);
        });
    </script>
</head>

<body class="landing">
<div class="landing-container">
    <h1 class="app-title">Queue Master</h1>

    <div class="landing-island">
        <p>
            To use the app, connect with your Spotify account.<br><br>
            You can join another user's jam (Jams last an hour and require restarting when they expire),
            or use the same account that's playing music.<br><br>
            If no music is playing, or you do not have a Premium account, nothing will be displayed.
        </p>

        <button id="loginBtn" class="spotify-login-btn">
            <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/Spotify_Logo_RGB_White.png" alt="Spotify Logo" />
            Connect with Spotify
        </button>
    </div>
</div>
</body>
</html>
