<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My Spotify Profile</title>
    <script src="src/script.ts" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="src/css/queue.css">

</head>
<body>

<!-- Left sidebar -->
<aside class="leftSidebar"></aside>

<a id="profile" href="https://accounts.spotify.com/login">
    <img id="imgUrl" src="public/default-avatar.png" alt="Spotify Profile" />
</a>

<!-- Background elements (always behind everything) -->
<div id="backgroundContainer">
    <video autoplay muted loop playsinline id="bgVideo">
        <source src="/background.mp4" type="video/mp4">
    </video>
    <img id="bgImage" src="/RedBlackWhiteBoldHorseAlbumCover.png" alt="Background Image" />
</div>

<!-- Currently Playing Section (hidden initially) -->
<div class="currentlyPlaying" style="display:none;">
    <img id="albumArt" src="" alt="Album Art">
    <h1 id="songTitle">Song Title</h1>
    <h1 id="danceTitle">Dance Title</h1>
</div>

<div id="upNextColumn">
    <div id="songsList"></div>
    <div id="qrCodeContainer" class="songItem"></div>
</div>

<!-- Fullscreen Button -->
<button id="fullscreenBtn" class="action-btn fullscreen-btn">
    <span class="icon">⛶</span> Fullscreen
</button>

<div id="bottomButtons">
    <input type="file" id="bgUploadInput" accept="image/*" style="display: none;" />
    <button id="openPopoutBtn" class="action-btn">Pop-out</button>
    <button id="partnerDanceBtn" class="action-btn">Partner Dance</button>
    <button id="uploadBgBtn" class="action-btn">Upload Background</button>
    <button id="hideQueueBtn" class="action-btn">Hide Queue</button>
</div>

</body>
</html>
